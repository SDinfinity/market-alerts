# Cloudflare Worker configuration for the Market Alerts Telegram webhook.
# Deploy with: wrangler deploy
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "market-alerts-bot"
main = "index.js"
compatibility_date = "2024-01-01"

# ── Non-secret configuration variables ──────────────────────────────────────
# These are safe to store in this file (not sensitive).
# Replace the values below with your actual GitHub username and repo name.
[vars]
GITHUB_OWNER = "SDinfinity"
GITHUB_REPO  = "market-alerts"

# ── KV Namespace ─────────────────────────────────────────────────────────────
# Stores deduplication state (which alerts were sent today).
# Using KV instead of GitHub API keeps the critical alert path fully
# Cloudflare-native: sub-millisecond reads/writes, no external dependency.
#
# One-time setup — run this once, then paste the id below:
#   cd worker && wrangler kv:namespace create "MARKET_ALERTS_KV"
#
# For local dev with wrangler dev, also add a preview_id:
#   cd worker && wrangler kv:namespace create "MARKET_ALERTS_KV" --preview
[[kv_namespaces]]
binding    = "MARKET_ALERTS_KV"
id         = "946c383b986f46cb8f6905b8ce03335a"

# ── Cron Triggers ────────────────────────────────────────────────────────────
# Worker fires at exact alert times and sends Telegram directly.
# GitHub Actions crons remain as a single-shot last-resort backup only.
#
# 3:47 AM UTC  = 9:17 AM IST  → opening alert
# 10:30 AM UTC = 4:00 PM IST  → closing alert
[triggers]
crons = ["47 3 * * 1-5", "30 10 * * 1-5"]

# ── Secrets (set via CLI, NOT stored here) ───────────────────────────────────
# Run these commands once after deploying:
#
#   wrangler secret put TELEGRAM_BOT_TOKEN
#   wrangler secret put TELEGRAM_CHAT_ID
#   wrangler secret put GITHUB_TOKEN
#
# You will be prompted to paste the value for each secret.
# Secrets are encrypted and stored in Cloudflare — never in this file.
