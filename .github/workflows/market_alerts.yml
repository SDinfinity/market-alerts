# GitHub Actions workflow for the Market Alerts Bot.
#
# PRIMARY alerting is now handled by the Cloudflare Worker cron, which fires at
# exactly 9:17 AM IST and 4:00 PM IST and sends Telegram directly.
#
# These GitHub Actions scheduled runs are a BACKUP in case the Worker fails.
# They check data/last_alert.json — if the Worker already sent, they no-op.
# The wide windows + frequent crons ensure the backup catches any Worker failure.
#
# Opening backup window:  3:15 AM – 6:00 AM UTC  (8:45 AM – 11:30 AM IST)
# Closing backup window:  9:45 AM – 12:30 PM UTC (3:15 PM – 6:00 PM IST)

name: Market Alerts

on:
  schedule:
    # ── Opening window (alert fires at 9:17 AM IST = 3:47 AM UTC) ──────────────
    # Core: every 3 min, 3:15–4:03 AM UTC (8:45–9:33 AM IST)
    - cron: "15-59/3 3 * * 1-5"
    - cron: "0-3 4 * * 1-5"
    # Extended tail: every 15 min, 4:15–6:00 AM UTC (9:45–11:30 AM IST)
    # Catches runs when GitHub delays crons by 60–90+ minutes.
    - cron: "15,30,45 4 * * 1-5"
    - cron: "0,15,30,45 5 * * 1-5"
    - cron: "0 6 * * 1-5"
    # ── Closing window (alert fires at 4:00 PM IST = 10:30 AM UTC) ─────────────
    # Core: every 3 min, 9:45–10:45 AM UTC (3:15–4:15 PM IST)
    - cron: "45-59/3 9 * * 1-5"
    - cron: "0-45/3 10 * * 1-5"
    # Extended tail: every 15 min, 11:00 AM–12:30 PM UTC (4:30–6:00 PM IST)
    - cron: "0,15,30,45 11 * * 1-5"
    - cron: "0,30 12 * * 1-5"

  # Allow manual triggering from the GitHub Actions tab in your browser
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - opening
          - closing
          - test
          - dry-run
          - commands

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    # Allow this job to read and write to the repository (for watchlist and dedup updates)
    permissions:
      contents: write

    steps:
      # Step 1: Download the latest code from your GitHub repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Step 3: Install all required Python packages
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run the bot
      # In normal (scheduled) mode, the bot decides what to do based on current time.
      # In manual mode, it uses whatever you selected from the dropdown.
      - name: Run market alerts bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ] || [ "$MODE" = "normal" ]; then
            echo "Running in normal (scheduled) mode"
            python src/main.py
          elif [ "$MODE" = "opening" ]; then
            echo "Running forced opening alert"
            python src/main.py --opening
          elif [ "$MODE" = "closing" ]; then
            echo "Running forced closing alert"
            python src/main.py --closing
          elif [ "$MODE" = "test" ]; then
            echo "Running test mode (sends both alerts)"
            python src/main.py --test
          elif [ "$MODE" = "dry-run" ]; then
            echo "Running dry run (prints messages, no Telegram send)"
            python src/main.py --dry-run
          elif [ "$MODE" = "commands" ]; then
            echo "Commands are handled by Cloudflare Worker — nothing to do"
            python src/main.py --commands
          fi
        working-directory: ${{ github.workspace }}

      # Step 5: Commit data files back to the repo so they persist across runs.
      # - data/watchlist.json: updated by /add and /remove commands
      # - data/last_alert.json: deduplication state (which alerts were sent today)
      #
      # Pull before push so concurrent runs don't overwrite each other's state.
      # Example race: opening run commits opening=true; closing run checked out
      # before that commit and would otherwise reset opening back to false.
      - name: Commit data files (if changed)
        run: |
          git config user.name "market-alerts-bot"
          git config user.email "bot@market-alerts"
          git add data/watchlist.json
          if [ -f data/last_alert.json ]; then git add data/last_alert.json; fi
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit"
          else
            git commit -m "Update bot data [skip ci]"
            git pull --rebase origin main
            git push
          fi
