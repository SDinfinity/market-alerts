# GitHub Actions workflow for the Market Alerts Bot.
#
# PRIMARY alerting is handled by the Cloudflare Worker cron triggers, which
# fire at exactly 9:17 AM IST and 4:00 PM IST and send Telegram directly.
# Dedup state lives in Cloudflare KV — no GitHub API in the Worker's hot path.
#
# These scheduled runs are a single-shot LAST-RESORT backup only.
# They fire once, 23 minutes after each expected alert time. Before running
# the Python bot, each job queries the Worker's GET / status endpoint; if the
# Worker already sent, the job exits immediately with no Telegram message sent.
#
# Backup fires at:
#   4:10 AM UTC  = 9:40 AM IST  → opening backup  (23 min after Worker)
#   10:50 AM UTC = 4:20 PM IST  → closing backup  (20 min after Worker)
#
# PREREQUISITE — set these in GitHub → Settings → Secrets and variables:
#   Secrets:   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#   Variables: WORKER_URL  (e.g. https://market-alerts-bot.<subdomain>.workers.dev)

name: Market Alerts

on:
  schedule:
    # Single-shot opening backup: 4:10 AM UTC = 9:40 AM IST
    - cron: "10 4 * * 1-5"
    # Single-shot closing backup: 10:50 AM UTC = 4:20 PM IST
    - cron: "50 10 * * 1-5"

  # Manual trigger from the GitHub Actions tab — for testing and forced sends
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - opening
          - closing
          - test
          - dry-run
          - commands

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data/last_alert.json after a backup send

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market alerts bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MODE="${{ github.event.inputs.mode }}"

          # ── Manual dispatch: run exactly the mode the user selected ──────────
          if [ -n "$MODE" ] && [ "$MODE" != "normal" ]; then
            case "$MODE" in
              opening)  python src/main.py --opening  ;;
              closing)  python src/main.py --closing  ;;
              test)     python src/main.py --test     ;;
              dry-run)  python src/main.py --dry-run  ;;
              commands) echo "Commands are handled by Cloudflare Worker — nothing to do"
                        python src/main.py --commands ;;
            esac
            exit 0
          fi

          # ── Scheduled / normal run: this is the last-resort backup ───────────
          # Determine which alert window we are in based on UTC hour.
          UTC_HOUR=$((10#$(date -u +"%H")))
          if [ "$UTC_HOUR" -lt 9 ]; then
            ALERT_TYPE="opening"
          else
            ALERT_TYPE="closing"
          fi

          echo "Backup run: checking whether Worker already sent ${ALERT_TYPE} alert..."

          # Query the Worker's status endpoint (GET /).
          # If the endpoint is unreachable (Cloudflare down), WORKER_STATUS will
          # be '{}' and we fall through to the Python backup — correct behaviour.
          WORKER_URL="${{ vars.WORKER_URL }}"
          TODAY_IST=$(TZ="Asia/Kolkata" date +"%Y-%m-%d")
          WORKER_STATUS=$(curl -sf --max-time 10 "${WORKER_URL}/" 2>/dev/null || echo '{}')

          ALREADY_SENT=$(echo "$WORKER_STATUS" | python3 -c "
import sys, json
d = json.load(sys.stdin)
sent = d.get('date') == '$TODAY_IST' and d.get('$ALERT_TYPE', False)
print('true' if sent else 'false')
" 2>/dev/null || echo "false")

          if [ "$ALREADY_SENT" = "true" ]; then
            echo "Worker already sent ${ALERT_TYPE} alert — skipping backup"
            exit 0
          fi

          echo "Worker did not send ${ALERT_TYPE} alert — running Python backup"
          python src/main.py --${ALERT_TYPE}
        working-directory: ${{ github.workspace }}

      # Commit data/last_alert.json if the Python backup actually sent an alert.
      # This keeps a record in the repo and prevents re-sends if this job is
      # manually re-run on the same day.
      - name: Commit data files (if changed)
        run: |
          git config user.name "market-alerts-bot"
          git config user.email "bot@market-alerts"
          if [ -f data/last_alert.json ]; then git add data/last_alert.json; fi
          git add data/watchlist.json
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit"
          else
            git commit -m "Update bot data [skip ci]"
            git pull --rebase origin main
            git push
          fi
