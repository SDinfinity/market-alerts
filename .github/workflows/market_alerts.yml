# GitHub Actions workflow for the Market Alerts Bot.
# Runs frequent crons during two wide windows to survive GitHub scheduler delays.
#
# Opening window: every 3 min, 3:15–3:59 AM UTC + 4:00–4:03 AM UTC
#   = 8:45–9:33 AM IST (market opens 9:15 AM IST, alert fires at 9:17 AM IST)
#   Script sleeps inside until 9:17 AM IST if it starts early.
#   Deduplication via data/last_alert.json prevents double-sends.
#
# Closing window: every 3 min, 9:45–9:59 AM UTC + 10:00–10:45 AM UTC
#   = 3:15–4:15 PM IST (market closes 3:30 PM IST, alert fires at 4:00 PM IST)
#   Script sleeps inside until 4:00 PM IST if it starts early.
#
# Telegram commands are handled entirely by the Cloudflare Worker (webhook).
# GitHub Actions no longer polls for commands.

name: Market Alerts

on:
  schedule:
    # Opening window: every 3 min from 3:15 to 3:59 AM UTC (8:45–9:29 AM IST)
    - cron: "15-59/3 3 * * 1-5"
    # Opening window continued: 4:00–4:03 AM UTC (9:30–9:33 AM IST)
    - cron: "0-3 4 * * 1-5"
    # Closing window: every 3 min from 9:45 to 9:59 AM UTC (3:15–3:29 PM IST)
    - cron: "45-59/3 9 * * 1-5"
    # Closing window continued: every 3 min from 10:00 to 10:45 AM UTC (3:30–4:15 PM IST)
    - cron: "0-45/3 10 * * 1-5"

  # Allow manual triggering from the GitHub Actions tab in your browser
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "normal"
        type: choice
        options:
          - normal
          - opening
          - closing
          - test
          - dry-run
          - commands

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    # Allow this job to read and write to the repository (for watchlist and dedup updates)
    permissions:
      contents: write

    steps:
      # Step 1: Download the latest code from your GitHub repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Step 3: Install all required Python packages
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run the bot
      # In normal (scheduled) mode, the bot decides what to do based on current time.
      # In manual mode, it uses whatever you selected from the dropdown.
      - name: Run market alerts bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ -z "$MODE" ] || [ "$MODE" = "normal" ]; then
            echo "Running in normal (scheduled) mode"
            python src/main.py
          elif [ "$MODE" = "opening" ]; then
            echo "Running forced opening alert"
            python src/main.py --opening
          elif [ "$MODE" = "closing" ]; then
            echo "Running forced closing alert"
            python src/main.py --closing
          elif [ "$MODE" = "test" ]; then
            echo "Running test mode (sends both alerts)"
            python src/main.py --test
          elif [ "$MODE" = "dry-run" ]; then
            echo "Running dry run (prints messages, no Telegram send)"
            python src/main.py --dry-run
          elif [ "$MODE" = "commands" ]; then
            echo "Commands are handled by Cloudflare Worker — nothing to do"
            python src/main.py --commands
          fi
        working-directory: ${{ github.workspace }}

      # Step 5: Commit data files back to the repo so they persist across runs.
      # - data/watchlist.json: updated by /add and /remove commands
      # - data/last_alert.json: deduplication state (which alerts were sent today)
      - name: Commit data files (if changed)
        run: |
          git config user.name "market-alerts-bot"
          git config user.email "bot@market-alerts"
          git add data/watchlist.json data/last_alert.json
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit"
          else
            git commit -m "Update bot data [skip ci]"
            git push
          fi
